<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица Ноутбуков</title>
    <style>
        body {
            background-image: url('/images/customer.jpg');
            background-repeat: no-repeat;
            background-position: right;
            background-size: 200px;
            background-attachment: scroll;
            background-color: #f0f0f0; /* фон под иконкой */
        }
        table {
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            cursor: pointer;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: space-between;
        }
        nav li {
            margin-right: 20px;
        }
        nav a {
            text-decoration: none;
            color: #337ab7;
        }
        nav a:hover {
            color: #23527c;
        }
        .cart-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #337ab7;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: background-color 0.3s;
            z-index: 1000;
        }
        .cart-button:hover {
            background-color: #23527c;
        }
        .add-to-cart {
            padding: 5px 10px;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-to-cart:hover {
            background-color: #449d44;
        }

    </style>
</head>
<body>
<h1>Таблица Ноутбуков</h1>
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <div id="user-info" style="font-weight: bold; font-size: 16px;"></div>
    <button onclick="signOut()" style="
        background-color: #d9534f;
        color: white;
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    ">Выйти</button>
</div>
<nav>
    <ul>
        <li><a href="customer-pc-table.html">Компьютеры</a></li>
        <li><a href="customer-printer-table.html">Принтеры</a></li>
        <li><a href="customer-index.html">Главная</a></li>
    </ul>
</nav>

<a href="customer-cart.html" class="cart-button">🛒 В корзину</a>

<table id="laptop-table">
    <thead>
    <tr>
        <th>Код</th>
        <th>Модель</th>
        <th>Скорость</th>
        <th>ОЗУ</th>
        <th>Жёстрий диск</th>
        <th>Цена</th>
        <th>Дюймы</th>

    </tr>
    </thead>
    <tbody id="laptop-body">
    </tbody>
</table>

<script>
    const tableBody = document.getElementById('laptop-body');
    const token = localStorage.getItem('authToken');
    const username = localStorage.getItem('username');

    if (!token) {
        alert("Вы не авторизованы. Пожалуйста, войдите в систему.");
        window.location.href = "login.html";
    }

    const loadModels = () => {
        fetch('http://localhost:8080/customer/products/all')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Ошибка ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                const modelSelect = document.getElementById('model');
                // Очистим предыдущие опции, если они есть
                modelSelect.innerHTML = '<option value="" disabled selected>Выберите модель</option>';

                // Отфильтровать только модели с типом Laptop
                const laptops = data.filter(product => product.type === 'Laptop');
                laptops.forEach(laptop => {
                    const option = document.createElement('option');
                    option.value = laptop.model; // Устанавливаем значение модели
                    option.textContent = laptop.model; // Отображаем название модели
                    modelSelect.appendChild(option);
                });

                if (laptops.length === 0) {
                    const noOption = document.createElement('option');
                    noOption.value = "";
                    noOption.textContent = "Нет доступных моделей";
                    modelSelect.appendChild(noOption);
                }
            })
            .catch(error => console.error('Ошибка загрузки моделей:', error));
    };

    const loadTable = () => {
        fetch('http://localhost:8080/customer/laptops/all')
            .then(response => response.json())
            .then(data => {
                tableBody.innerHTML = ''; // Очистить таблицу перед загрузкой
                data.forEach(laptop => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${laptop.code}</td>
                        <td>${laptop.model}</td>
                        <td>${laptop.speed}</td>
                        <td>${laptop.ram}</td>
                        <td>${laptop.hd}</td>
                        <td>${laptop.price}</td>
                        <td>${laptop.screen}</td>
                        <td><button class="add-to-cart" data-code="${laptop.code}">В корзину</button></td>
                        `;

                    // Переход по клику на любую ячейку, кроме кнопки
                    row.querySelectorAll('td:not(:last-child)').forEach(cell => {
                        cell.addEventListener('click', () => {
                            let url;
                            url = `customer-laptop.html?code=${laptop.code}`;
                            window.location.href = url;
                        });
                    });

                    // Обработчик кнопки "В корзину"
                    const button = row.querySelector('.add-to-cart');
                    button.addEventListener('click', (event) => {
                        event.stopPropagation(); // не переходить по строке

                        const code = laptop.code;
                        const model = laptop.model;

                        const cartItem = {
                            model: model,
                            code: code,
                            username : username
                        };

                        fetch('http://localhost:8080/customer/products', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token
                            },
                            body: JSON.stringify(cartItem)
                        })
                            .then(response => {
                                if (!response.ok) {
                                    throw new Error('Ошибка при добавлении в корзину');
                                }
                                return response.json(); // если API возвращает ответ
                            })
                            .then(data => {
                                alert(`Товар "${model}" добавлен в корзину!`);
                            })
                            .catch(error => {
                                console.error('Ошибка добавления в корзину:', error);
                                alert('Не удалось добавить в корзину.');
                            });
                    });

                    tableBody.appendChild(row);
                });
            })
            .catch(error => console.error('Ошибка:', error));
    };

    fetch('http://localhost:8080/customer/laptops/all', {
        headers: {
            'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token
        },
    })
        .then(response => {
            if (!response.ok) {
                throw new Error("Ошибка ${response.status}: ${response.statusText}");
            }
            return response.json();
        })
        .then(data => {
            const tableBody = document.getElementById('laptop-body');
            data.forEach(laptop => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${laptop.code}</td>
                    <td>${laptop.model}</td>
                    <td>${laptop.speed}</td>
                    <td>${laptop.ram}</td>
                    <td>${laptop.hd}</td>
                    <td>${laptop.price}</td>
                    <td>${laptop.screen}</td>
                    <td><button class="add-to-cart" data-code="${laptop.code}">В корзину</button></td>
                    `;

                // Переход по клику на любую ячейку, кроме кнопки
                row.querySelectorAll('td:not(:last-child)').forEach(cell => {
                    cell.addEventListener('click', () => {
                        let url;
                        url = `customer-laptop.html?code=${laptop.code}`;
                        window.location.href = url;
                    });
                });

                // Обработчик кнопки "В корзину"
                const button = row.querySelector('.add-to-cart');
                button.addEventListener('click', (event) => {
                    event.stopPropagation(); // не переходить по строке

                    const code = laptop.code;
                    const model = laptop.model;
                    const price = laptop.price;

                    const cartItem = {
                        model: model,
                        code: code,
                        price: price,
                        username : username
                    };

                    fetch('http://localhost:8080/customer/products', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify(cartItem)
                    })
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Ошибка при добавлении в корзину');
                            }
                            return response.json(); // если API возвращает ответ
                        })
                        .then(data => {
                            alert(`Товар "${model}" добавлен в корзину!`);
                        })
                        .catch(error => {
                            console.error('Ошибка добавления в корзину:', error);
                            alert('Не удалось добавить в корзину.');
                        });
                });

                tableBody.appendChild(row);
            });
        })
        .catch(error => console.error('Ошибка:', error));
    document.getElementById("user-info").innerText = "Вы вошли как: " + (username || "Гость")
    function signOut() {
        localStorage.removeItem("authToken");
        localStorage.removeItem("username");
        window.location.href = "login.html";
    }
</script>
</body>
</html>
